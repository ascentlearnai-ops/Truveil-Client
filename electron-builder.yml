appId: com.truveil.secure
productName: TruveilSecure
protocols:
  - name: Truveil Secure
    schemes:
      - truveil
directories:
  output: dist
files:
  - main.js
  - preload.js
  - package.json
  - assets/**/*
  - src/config/runtime-config.json
  - src/audio/**/*
  - src/lockdown/**/*
  - src/renderer/**/*
  - src/transcription/**/*
mac:
  category: public.app-category.business
  target:
    - dmg
win:
  icon: assets/truveil.ico
  target:
    - nsis
  artifactName: TruveilSecure-Setup-${version}.${ext}
  requestedExecutionLevel: asInvoker
  signAndEditExecutable: false
nsis:
  oneClick: true
  perMachine: false
  runAfterFinish: true
